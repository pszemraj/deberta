# Tiny CPU smoke config.
# Usage:
#   deberta-pretrain configs/tiny_cpu_smoke.yaml

model:
  tokenizer_name_or_path: microsoft/deberta-v3-base
  backbone_type: rope
  from_scratch: true
  embedding_sharing: gdes
  norm_arch: post

# For a true CPU smoke test, use a tiny local text file dataset.
# Create e.g. ./data/tiny.txt with a few lines.
data:
  dataset_name: text
  dataset_config_name: null
  load_from_disk: null
  data_files: ./data/tiny.txt
  train_split: train
  streaming: true
  text_column_name: text
  max_seq_length: 128
  shuffle_buffer_size: 1000

train:
  output_dir: runs/tiny_cpu
  overwrite_output_dir: true
  max_steps: 50
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-3
  warmup_steps: 0
  logging_steps: 5
  mixed_precision: no
  report_to: none
