# Canonical long-run DeBERTa-v2/v3 parity config (small).
# Usage:
#   accelerate launch --config_file configs/accelerate/fsdp2_hf_deberta_1node.yaml --no_python \
#     deberta train configs/pretrain_hf_deberta_v2_parity_small.yaml

model:
  profile: deberta_v3_parity
  tokenizer_name_or_path: microsoft/deberta-v3-small
  backbone_type: hf_deberta_v2
  hf_model_size: small
  discriminator_model_name_or_path: microsoft/deberta-v3-small
  generator_model_name_or_path: null
  from_scratch: true
  embedding_sharing: gdes
  hf_attention_kernel: dynamic

data:
  dataset_name: HuggingFaceFW/fineweb-edu
  dataset_config_name: default
  train_split: train
  streaming: true
  pack_sequences: true
  block_cross_document_attention: false
  text_column_name: text
  max_seq_length: 512
  shuffle_buffer_size: 10000

train:
  output_dir: runs/hf_deberta_v2_parity_small
  overwrite_output_dir: false
  project_name: deberta-train
  run_name: null

  max_steps: 500000
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 16

  learning_rate: 5e-4
  generator_learning_rate: -1.0
  weight_decay: 0.01
  warmup_steps: 10000
  adam_beta2: 0.999
  adam_epsilon: 1.0e-6

  mlm_probability: 0.15
  mlm_max_ngram: 1
  mask_token_prob: 1.0
  random_token_prob: 0.0
  sampling_temperature: 1.0

  gen_loss_weight: 1.0
  disc_loss_weight: 10.0  # parity++ delta vs paper lambda=50
  decoupled_training: true
  token_weighted_gradient_accumulation: false

  logging_steps: 25
  save_steps: 1000
  save_total_limit: 3
  report_to: none
